name: breaking-news

on:
  schedule:
    # 10분마다 새 속보 확인 (GitHub 사정에 따라 몇 분 지연될 수 있음)
    - cron: "*/10 * * * *"
  workflow_dispatch:

# 이전 실행이 끝나기 전에 다음 실행이 겹치지 않도록 함
concurrency:
  group: breaking-news
  cancel-in-progress: false

permissions:
  contents: write # 중복 방지 기록(state/seen.json)을 저장소에 커밋하기 위해 필요

jobs:
  breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check breaking news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python breaking.py

      - name: Save seen state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --cached --quiet || (git commit -m "chore: update seen state [skip ci]" && git push)
