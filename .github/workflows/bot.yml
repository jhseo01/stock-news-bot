# 10분마다 실행: 텔레그램 명령 처리 + 브리핑(설정 시간) + 속보 체크(설정 주기)
name: bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_briefing:
        description: "브리핑 즉시 전송"
        type: boolean
        default: false

# 이전 실행이 끝나기 전에 다음 실행이 겹치지 않도록 함
concurrency:
  group: bot
  cancel-in-progress: false

permissions:
  contents: write # 설정·상태 파일을 저장소에 커밋하기 위해 필요

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_BRIEFING: ${{ inputs.force_briefing == true && '1' || '' }}
        run: python bot.py

      - name: Save state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state settings.json
          git diff --cached --quiet || (git commit -m "chore: update bot state [skip ci]" && git pull --rebase && git push)
